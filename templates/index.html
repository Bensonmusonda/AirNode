<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AirNode</title>

    <!-- Local client-side dependencies -->
    <link rel="stylesheet" href="/static/vendor/pico.min.css" />
    <script src="/static/vendor/htmx.min.js" defer></script>
    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('airnode', () => ({
                query: '',
                itemCount: 0,
                currentPath: '',
                sheet: null,
                viewer: null,

                init() {
                    this.currentPath = document.getElementById('init-path').dataset.path;
                    this.updateCount();
                },

                updateCount() {
                    this.itemCount = document.querySelectorAll(
                        '.file-row:not([style*="display: none"])'
                    ).length;
                },

                openModal(file) {
                    this.sheet = file;
                },

                closeSheet() {
                    this.sheet = null;
                },

                openViewer(file) {
                    const ext = file.ext.toLowerCase();
                    let kind = 'text';
                    if (['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg'].includes(ext)) kind = 'img';
                    else if (['mp4', 'webm', 'mov'].includes(ext)) kind = 'video';
                    else if (['mp3', 'ogg', 'wav', 'm4a', 'aac', 'flac'].includes(ext)) kind = 'audio';
                    else if (ext === 'pdf') kind = 'pdf';
                    this.viewer = { name: file.name, path: file.path, kind };
                    this.sheet = null;
                },

                closeViewer() {
                    this.viewer = null;
                }
            }));
        });
    </script>

    <script src="/static/vendor/alpine.min.js" defer></script>

    <style>
        /* ── Design Tokens ─────────────────────────────────────────── */
        :root {
            --bg: #0D1117;
            --surface: #161B22;
            --border: #21262D;
            --text: #E6EDF3;
            --muted: #8B949E;
            --accent: #00B4D8;
            --accent-dim: #005F73;
            --danger: #F85149;
            --dir-color: #79C0FF;
            --mono: "JetBrains Mono", "Fira Code", "Cascadia Code", monospace;
            --radius: 4px;
            --row-h: 44px;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        html,
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--mono);
            font-size: 13px;
            line-height: 1.5;
            margin: 0;
            min-height: 100dvh;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        button {
            cursor: pointer;
        }

        /* ── Layout ────────────────────────────────────────────────── */
        .layout {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            overflow: hidden;
        }

        /* ── Header ────────────────────────────────────────────────── */
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 16px;
            height: 48px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .wordmark {
            color: var(--accent);
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .header-sep {
            color: var(--border);
            font-size: 18px;
            font-weight: 300;
        }

        /* ── Path Bar ──────────────────────────────────────────────── */
        .path-bar {
            flex: 1;
            display: flex;
            align-items: center;
            overflow: hidden;
        }

        .path-prompt {
            color: var(--accent);
            margin-right: 6px;
            flex-shrink: 0;
        }

        .breadcrumbs {
            display: flex;
            align-items: center;
            overflow: hidden;
            white-space: nowrap;
        }

        .crumb-root {
            color: var(--muted);
            font-size: 13px;
        }

        .crumb {
            display: inline-flex;
            align-items: center;
            color: var(--muted);
            font-size: 13px;
        }

        .crumb button {
            background: none;
            border: none;
            padding: 2px 4px;
            color: var(--text);
            font-family: var(--mono);
            font-size: 13px;
            border-radius: var(--radius);
            transition: color 0.1s, background 0.1s;
        }

        .crumb button:hover {
            color: var(--accent);
            background: color-mix(in srgb, var(--accent) 10%, transparent);
        }

        .crumb-sep {
            color: var(--border);
            margin: 0 1px;
            font-size: 16px;
        }

        .crumb-current {
            color: var(--text);
            font-size: 13px;
            padding: 2px 4px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .path-cursor {
            display: inline-block;
            width: 7px;
            height: 13px;
            background: var(--accent);
            margin-left: 3px;
            vertical-align: middle;
            border-radius: 1px;
            animation: blink 1.1s step-end infinite;
            flex-shrink: 0;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        /* ── Search ────────────────────────────────────────────────── */
        .search-wrap {
            padding: 10px 16px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .search-input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: var(--mono);
            font-size: 13px;
            padding: 8px 12px;
            outline: none;
            transition: border-color 0.15s;
        }

        .search-input::placeholder {
            color: var(--muted);
        }

        .search-input:focus {
            border-color: var(--accent);
        }

        /* ── File List ─────────────────────────────────────────────── */
        .list-wrap {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }

        .list-wrap::-webkit-scrollbar {
            width: 4px;
        }

        .list-wrap::-webkit-scrollbar-track {
            background: transparent;
        }

        .list-wrap::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        .file-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .file-row {
            display: flex;
            align-items: center;
            min-height: var(--row-h);
            padding: 0 16px;
            border-bottom: 1px solid var(--border);
            transition: background 0.1s;
            -webkit-tap-highlight-color: transparent;
        }

        .file-row:hover,
        .file-row:active {
            background: color-mix(in srgb, var(--accent) 6%, transparent);
        }

        .row-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            background: none;
            border: none;
            padding: 0;
            margin: 0;
            font-family: var(--mono);
            font-size: 13px;
            color: inherit;
            text-align: left;
            min-height: var(--row-h);
            cursor: pointer;
        }

        .row-icon {
            font-size: 15px;
            flex-shrink: 0;
            width: 20px;
            text-align: center;
        }

        .row-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 13px;
        }

        .row-name.is-dir {
            color: var(--dir-color);
        }

        .row-name.is-file {
            color: var(--text);
        }

        .row-meta {
            color: var(--muted);
            font-size: 11px;
            flex-shrink: 0;
            text-align: right;
        }

        .row-chevron {
            color: var(--border);
            font-size: 16px;
            flex-shrink: 0;
        }

        /* ── Empty State ───────────────────────────────────────────── */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 64px 16px;
            color: var(--muted);
            font-size: 13px;
        }

        .empty-state .empty-icon {
            font-size: 32px;
        }

        /* ── Loading ───────────────────────────────────────────────── */
        .htmx-indicator {
            display: none;
            padding: 16px;
            text-align: center;
            color: var(--muted);
            font-size: 12px;
        }

        .htmx-request .htmx-indicator {
            display: block;
        }

        /* ── Status Bar ────────────────────────────────────────────── */
        .status-bar {
            padding: 4px 16px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            color: var(--muted);
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            display: inline-block;
            box-shadow: 0 0 6px var(--accent);
        }

        /* ── Modal Backdrop ────────────────────────────────────────── */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.72);
            display: flex;
            align-items: flex-end;
            /* sheet slides up from bottom on mobile */
            justify-content: center;
            z-index: 100;
            padding: 0;
        }

        /* ── Action Sheet (file options) ───────────────────────────── */
        .action-sheet {
            background: var(--surface);
            border: 1px solid var(--border);
            border-bottom: none;
            border-radius: 12px 12px 0 0;
            width: 100%;
            max-width: 540px;
            padding: 20px 20px 32px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .sheet-filename {
            color: var(--text);
            font-size: 13px;
            font-weight: 600;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-bottom: 4px;
        }

        .sheet-meta {
            color: var(--muted);
            font-size: 11px;
            margin-bottom: 12px;
        }

        .sheet-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .sheet-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            padding: 13px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: var(--mono);
            font-size: 13px;
            cursor: pointer;
            text-align: left;
            transition: border-color 0.15s, background 0.15s;
            text-decoration: none;
        }

        .sheet-btn:hover {
            border-color: var(--accent);
            background: color-mix(in srgb, var(--accent) 8%, transparent);
        }

        .sheet-btn-icon {
            font-size: 16px;
            flex-shrink: 0;
        }

        .sheet-cancel {
            margin-top: 4px;
            background: none;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--muted);
            font-family: var(--mono);
            font-size: 13px;
            padding: 10px;
            width: 100%;
            cursor: pointer;
            transition: color 0.15s;
        }

        .sheet-cancel:hover {
            color: var(--danger);
        }

        /* ── Viewer Modal ──────────────────────────────────────────── */
        .viewer-wrap {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            display: flex;
            flex-direction: column;
            z-index: 110;
        }

        .viewer-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 16px;
            height: 48px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .viewer-title {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 13px;
            color: var(--text);
        }

        .viewer-close {
            background: none;
            border: none;
            color: var(--muted);
            font-size: 20px;
            line-height: 1;
            padding: 4px 8px;
            cursor: pointer;
            border-radius: var(--radius);
            transition: color 0.1s;
        }

        .viewer-close:hover {
            color: var(--danger);
        }

        .viewer-body {
            flex: 1;
            overflow: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        /* Image viewer */
        .viewer-body img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: var(--radius);
        }

        /* Video / Audio */
        .viewer-body video,
        .viewer-body audio {
            max-width: 100%;
            max-height: 100%;
            outline: none;
        }

        /* PDF / text via iframe */
        .viewer-body iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
            border-radius: var(--radius);
        }

        /* Plain text */
        .viewer-body pre {
            color: var(--text);
            font-family: var(--mono);
            font-size: 12px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-all;
            margin: 0;
            text-align: left;
            max-width: 800px;
            width: 100%;
        }
    </style>
</head>

<body>
    <div class="layout" x-data="airnode" x-init="init()">

        <!-- ══ Header ══════════════════════════════════════════════ -->
        <header class="header">
            <span class="wordmark">AirNode</span>
            <span class="header-sep">|</span>
            <nav class="path-bar" id="path-bar">
                <span class="path-prompt">›</span>
                <div class="breadcrumbs">
                    {% include "partials/breadcrumbs.html" %}
                </div>
                <span class="path-cursor"></span>
            </nav>
        </header>

        <!-- ══ Search ══════════════════════════════════════════════ -->
        <div class="search-wrap">
            <input class="search-input" type="search" placeholder="Filter files…" autocomplete="off" autocorrect="off"
                spellcheck="false" x-model="query" x-on:input="
          document.querySelectorAll('.file-row').forEach(row => {
            row.style.display = row.dataset.name.toLowerCase().includes(query.toLowerCase()) ? '' : 'none';
          });
          updateCount();
        " />
        </div>

        <!-- ══ File List ════════════════════════════════════════════ -->
        <main class="list-wrap">
            <div id="file-list-region" hx-indicator="#loading">
                {% include "partials/file_list.html" %}
            </div>
            <div id="loading" class="htmx-indicator">loading…</div>
        </main>

        <!-- ══ Status Bar ══════════════════════════════════════════ -->
        <footer class="status-bar">
            <span><span class="status-dot"></span> LAN</span>
            <span x-text="`${itemCount} items`"></span>
            <span style="margin-left:auto;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"
                x-text="currentPath"></span>
        </footer>

        <!-- ══ Action Sheet (file options modal) ════════════════════ -->
        <div class="modal-backdrop" x-show="sheet !== null" x-transition.opacity x-on:click.self="closeSheet()"
            style="display:none">
            <div class="action-sheet" x-on:click.stop>
                <div class="sheet-filename" x-text="sheet?.name"></div>
                <div class="sheet-meta" x-text="sheet?.size"></div>

                <div class="sheet-actions">
                    <!-- Direct file download option -->
                    <a class="sheet-btn" x-bind:href="'/download?path=' + encodeURIComponent(sheet?.path ?? '')"
                        x-on:click="closeSheet()">
                        <span class="sheet-btn-icon">⬇️</span>
                        <span>Download to device</span>
                    </a>

                    <!-- Inline viewer option for compatible media types -->
                    <button class="sheet-btn" x-show="sheet?.viewable" x-on:click="openViewer(sheet)">
                        <span class="sheet-btn-icon">👁️</span>
                        <span>View</span>
                    </button>
                </div>

                <button class="sheet-cancel" x-on:click="closeSheet()">Cancel</button>
            </div>
        </div>

        <!-- ══ Viewer ════════════════════════════════════════════════ -->
        <div class="viewer-wrap" x-show="viewer !== null" x-transition.opacity style="display:none">
            <div class="viewer-header">
                <button class="viewer-close" x-on:click="closeViewer()">✕</button>
                <span class="viewer-title" x-text="viewer?.name"></span>
                <a class="sheet-btn" style="width:auto;padding:6px 12px;font-size:11px;"
                    x-bind:href="'/download?path=' + encodeURIComponent(viewer?.path ?? '')">⬇️</a>
            </div>

            <div class="viewer-body">
                <!-- Image rendering container -->
                <template x-if="viewer?.kind === 'img'">
                    <img x-bind:src="'/view?path=' + encodeURIComponent(viewer.path)" x-bind:alt="viewer.name" />
                </template>

                <!-- Video player container -->
                <template x-if="viewer?.kind === 'video'">
                    <video controls autoplay x-bind:src="'/view?path=' + encodeURIComponent(viewer.path)"></video>
                </template>

                <!-- Audio player container -->
                <template x-if="viewer?.kind === 'audio'">
                    <audio controls autoplay x-bind:src="'/view?path=' + encodeURIComponent(viewer.path)"></audio>
                </template>

                <!-- PDF document frame -->
                <template x-if="viewer?.kind === 'pdf'">
                    <iframe x-bind:src="'/view?path=' + encodeURIComponent(viewer.path)"></iframe>
                </template>

                <!-- Plain text and source code container -->
                <template x-if="viewer?.kind === 'text'">
                    <div x-data="{ content: '' }" x-init="fetch('/view?path=' + encodeURIComponent(viewer.path))
                          .then(r => r.text())
                          .then(t => content = t)">
                        <pre x-text="content"></pre>
                    </div>
                </template>
            </div>
        </div>

        <!-- Element holding initial path state to avoid inline Jinja string escaping inside Alpine JS initialization -->
        <span id="init-path" data-path="{{ current_path }}" style="display:none"></span>
    </div><!-- /.layout -->

</body>

</html>
